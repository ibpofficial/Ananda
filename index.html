                const searchTag = state.language === 'en' ? state.panditFilter : t('filter_' + state.panditFilter.toLowerCase());

                                <h4 class="text-sm text-center font-bold text-gray-500 uppercase tracking-widest mb-6 mt-2">${t('chart_title')}</h4>
                                <div class="w-full max-w-xl mx-auto">
                                    ${renderNorthIndianChart(placements)}
                                </div>
                             </div>
                        </div>

                        <div class="prose prose-base md:prose-lg max-w-none bg-white p-8 md:p-12 rounded-[2.5rem] border border-gray-100 shadow-lg shadow-gray-200/50">
                            ${marked.parse(state.kundaliData.prediction)}
                        </div>

                        <!-- Contextual Q&A Section -->
                        <div class="mt-12 pt-8 border-t-2 border-gray-100 relative">
                            <div class="flex items-center gap-3 mb-2 justify-center md:justify-start">
                                <div class="w-10 h-10 rounded-full bg-brand-100 flex items-center justify-center text-brand-600">
                                    <i data-lucide="message-circle" class="w-5 h-5"></i>
                                </div>
                                <div>
                                    <h4 class="font-bold text-gray-900 text-lg uppercase tracking-wide">Astrologer Chat</h4>
                                    <p class="text-xs text-gray-500 font-medium">You can ask ${MAX_KUNDALI_QUESTIONS - state.kundaliQuestionsAsked} more question(s) about this chart.</p>
                                </div>
                            </div>
                            
                            ${qaHtml}
                            
                            <div id="qa-loading" class="hidden justify-start mt-6">
                                <div class="bg-gray-50 border border-gray-200 p-5 rounded-[1.5rem] rounded-tl-md flex gap-2 shadow-sm">
                                    <div class="w-2.5 h-2.5 rounded-full bg-brand-300 animate-bounce" style="animation-delay: 0s"></div>
                                    <div class="w-2.5 h-2.5 rounded-full bg-brand-400 animate-bounce" style="animation-delay: 0.1s"></div>
                                    <div class="w-2.5 h-2.5 rounded-full bg-brand-500 animate-bounce" style="animation-delay: 0.2s"></div>
                                </div>
                            </div>

                            ${qaInputHtml}
                        </div>
                    </div>
                `;
            }

            return `
                ${renderHeader(t('gen_kundali_header'), t('gen_kundali_sub'))}
                <div class="px-6 py-6 animate-slide-up max-w-2xl mx-auto">
                    <div class="bg-white p-8 md:p-10 rounded-[2.5rem] mb-6 relative overflow-hidden shadow-xl shadow-gray-200/50 border border-gray-100">
                        <div class="absolute top-0 right-0 w-48 h-48 bg-gradient-to-bl from-brand-50 to-white rounded-bl-full -z-0"></div>
                        
                        <form id="kundali-form" onsubmit="generateKundali(event)" class="space-y-6 relative z-10">
                            <div>
                                <label class="block text-xs md:text-sm font-bold text-gray-500 mb-2.5 ml-2 uppercase tracking-widest">${t('form_name')}</label>
                                <input type="text" name="name" required class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:border-brand-500 focus:bg-white focus:ring-4 focus:ring-brand-50 outline-none transition-all text-gray-800 text-lg" placeholder="e.g. Rahul Sharma">
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-xs md:text-sm font-bold text-gray-500 mb-2.5 ml-2 uppercase tracking-widest">${t('form_dob')}</label>
                                    <input type="date" name="dob" required class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:border-brand-500 focus:bg-white focus:ring-4 focus:ring-brand-50 outline-none transition-all text-gray-800 text-lg">
                                </div>
                                <div>
                                    <label class="block text-xs md:text-sm font-bold text-gray-500 mb-2.5 ml-2 uppercase tracking-widest">${t('form_time')}</label>
                                    <input type="time" name="tob" required class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:border-brand-500 focus:bg-white focus:ring-4 focus:ring-brand-50 outline-none transition-all text-gray-800 text-lg">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs md:text-sm font-bold text-gray-500 mb-2.5 ml-2 uppercase tracking-widest">${t('form_place')}</label>
                                <input type="text" name="place" required class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:border-brand-500 focus:bg-white focus:ring-4 focus:ring-brand-50 outline-none transition-all text-gray-800 text-lg" placeholder="e.g. Mumbai, India">
                            </div>

                            <button type="submit" class="w-full bg-gradient-to-r from-mystic-900 to-indigo-900 hover:from-mystic-800 hover:to-indigo-800 text-white py-4.5 rounded-full font-bold shadow-xl shadow-indigo-900/20 active:scale-95 transition-all flex items-center justify-center gap-2.5 mt-8 text-lg">
                                <i data-lucide="sparkles" class="w-5 h-5 text-brand-300"></i>
                                ${t('btn_generate')}
                            </button>
                        </form>
                    </div>
                    
                    <div id="loading-state" class="hidden flex-col items-center justify-center py-24 text-center">
                        <div class="relative w-32 h-32 mb-10">
                            <div class="absolute inset-0 border-[8px] border-brand-50 rounded-full"></div>
                            <div class="absolute inset-0 border-[8px] border-brand-500 rounded-full border-t-transparent animate-spin drop-shadow-md"></div>
                            <div class="absolute inset-0 flex items-center justify-center">
                                <i data-lucide="star" class="w-12 h-12 text-brand-500 animate-pulse drop-shadow-sm"></i>
                            </div>
                        </div>
                        <h3 class="text-3xl font-bold text-gray-900 mb-3 font-serif">${t('loading_title')}</h3>
                        <p class="text-gray-500 text-base max-w-[300px] mx-auto leading-relaxed">${t('loading_desc')}</p>
                    </div>
                </div>
            `;
        }

        // --- Logic & Event Handlers ---

        function bookAppointment(panditName = '') {
            const name = panditName ? ` with ${panditName}` : '';
            alert(`Booking interface initiated${name}. (This is a demo action. In a real app, this would open a booking calendar/payment gateway.)`);
        }

        function router(route) {
            const app = document.getElementById('app-content');
            
            if (route !== 'jaap') {
                document.body.style.background = '#fffbf5';
            }
            
            if (route !== 'jaap' && isMantraPlaying) {
                toggleMantraAudio();
            }

            app.style.opacity = '0';
            app.style.transform = 'translateY(10px)'; 
            
            setTimeout(() => {
                // Nav UI Update (Mobile)
                document.querySelectorAll('.nav-btn-mobile').forEach(btn => {
                    if (btn.getAttribute('data-target') === 'kundali') return;
                    const icon = btn.querySelector('svg');
                    const label = btn.querySelector('span');
                    const wrapper = btn.querySelector('.nav-icon-wrapper');
                    
                    if(icon) {
                        icon.classList.remove('text-brand-600');
                        icon.classList.add('text-gray-400');
                        wrapper.classList.remove('bg-brand-50');
                        label.classList.remove('text-brand-600');
                        label.classList.add('text-gray-400');
                    }
                });
                
                const activeBtnMob = document.querySelector(`.nav-btn-mobile[data-target="${route}"]`);
                if(activeBtnMob && route !== 'kundali') {
                    const activeIcon = activeBtnMob.querySelector('svg');
                    const activeLabel = activeBtnMob.querySelector('span');
                    const activeWrapper = activeBtnMob.querySelector('.nav-icon-wrapper');
                    
                    if(activeIcon) {
                        activeIcon.classList.remove('text-gray-400');
                        activeIcon.classList.add('text-brand-600');
                        activeWrapper.classList.add('bg-brand-50');
                        activeLabel.classList.remove('text-gray-400');
                        activeLabel.classList.add('text-brand-600');
                    }
                }

                // Nav UI Update (Desktop)
                document.querySelectorAll('.nav-btn-desktop').forEach(btn => {
                    btn.classList.remove('bg-brand-50', 'text-brand-700', 'shadow-sm', 'border', 'border-brand-100');
                    btn.classList.add('text-gray-600', 'hover:bg-gray-50');
                });
                const activeBtnDesk = document.querySelector(`.nav-btn-desktop[data-target="${route}"]`);
                if(activeBtnDesk) {
                    activeBtnDesk.classList.remove('text-gray-600', 'hover:bg-gray-50');
                    activeBtnDesk.classList.add('bg-brand-50', 'text-brand-700', 'shadow-sm', 'border', 'border-brand-100');
                }

                // Render Content
                app.style.transform = 'translateY(0)';
                if (route === 'home') app.innerHTML = renderHome();
                else if (route === 'jaap') app.innerHTML = renderJaap();
                else if (route === 'pandits') app.innerHTML = renderPandits();
                else if (route === 'temples') app.innerHTML = renderTemples();
                else if (route === 'kundali') app.innerHTML = renderKundali();

                lucide.createIcons();
                app.style.opacity = '1';
                app.scrollTop = 0;
            }, 300);
        }

        function changeGod(godKey) {
            state.currentGod = godKey;
            if(isMantraPlaying) toggleMantraAudio();
            saveState();
            router('jaap');
        }

        function handleChant(e) {
            const button = e.currentTarget;
            
            const circle = document.createElement("span");
            const diameter = Math.max(button.clientWidth, button.clientHeight);
            const radius = diameter / 2;
            const rect = button.getBoundingClientRect();
            
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${e.clientX - rect.left - radius}px`;
            circle.style.top = `${e.clientY - rect.top - radius}px`;
            circle.classList.add("ripple");
            
            const existingRipple = button.getElementsByClassName("ripple")[0];
            if (existingRipple) existingRipple.remove();
            button.appendChild(circle);

            const godStats = state.counts[state.currentGod];
            godStats.total++;
            
            if (godStats.total % 108 === 0) {
                godStats.malas++;
                if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
            } else {
                if (navigator.vibrate) navigator.vibrate(30);
            }

            saveState();
            document.getElementById('current-count').innerText = godStats.total % 108;
            document.getElementById('mala-count').innerText = godStats.malas;
        }
        
        function offerFlowers(e) {
            const colors = ['🌸', '🌺', '🌹', '🌼', '🌻'];
            for(let i=0; i<8; i++) {
                setTimeout(() => {
                    const flower = document.createElement('div');
                    flower.innerText = colors[Math.floor(Math.random() * colors.length)];
                    flower.classList.add('flower');
                    flower.style.left = Math.random() * window.innerWidth + 'px';
                    flower.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(flower);
                    setTimeout(() => flower.remove(), 4000);
                }, i * 200);
            }
            if(navigator.vibrate) navigator.vibrate(100);
        }
        
        function toggleMantraAudio() {
            isMantraPlaying = !isMantraPlaying;
            const icon = document.getElementById('mantra-icon');
            
            if(isMantraPlaying) {
                mantraAudio.play().catch(e => console.log(e));
                icon.setAttribute('data-lucide', 'pause');
                icon.parentElement.classList.add('text-brand-600', 'bg-white', 'border-brand-200', 'ring-2', 'ring-brand-100', 'ring-offset-2');
                icon.parentElement.classList.remove('text-gray-400');
            } else {
                mantraAudio.pause();
                icon.setAttribute('data-lucide', 'play');
                icon.parentElement.classList.remove('text-brand-600', 'bg-white', 'border-brand-200', 'ring-2', 'ring-brand-100', 'ring-offset-2');
                icon.parentElement.classList.add('text-gray-400');
            }
            lucide.createIcons();
        }

        function openMeditationSetup() {
            const overlay = document.getElementById('meditation-overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            document.getElementById('meditate-label').innerText = t('meditate_inhale');
            document.getElementById('timer-control').innerText = t('pause');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                overlay.classList.add('opacity-100');
            }, 10);
            startMeditation(5);
        }

        function closeMeditation() {
            const overlay = document.getElementById('meditation-overlay');
            overlay.classList.remove('opacity-100');
            overlay.classList.add('opacity-0');
            setTimeout(() => {
                overlay.classList.remove('flex');
                overlay.classList.add('hidden');
            }, 500);
            stopMeditation();
        }

        function startMeditation(minutes) {
            clearInterval(timerInterval);
            timeLeft = minutes * 60;
            isPaused = false;
            updateTimerDisplay();
            
            isMuted = false;
            updateMuteIcon();
            meditationAudio.currentTime = 0;
            meditationAudio.volume = 0.5;
            meditationAudio.play().catch(e => console.log("Audio play failed", e));
            
            timerInterval = setInterval(() => {
                if(!isPaused) {
                    timeLeft--;
                    updateTimerDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        if(navigator.vibrate) navigator.vibrate([500, 500, 500]);
                        document.getElementById('timer-control').innerText = t('complete');
                        meditationAudio.pause();
                    }
                }
            }, 1000);
        }

        function stopMeditation() {
            clearInterval(timerInterval);
            meditationAudio.pause();
            closeMeditation();
        }

        function toggleTimerState() {
            if (timeLeft <= 0) {
                closeMeditation();
                return;
            }
            isPaused = !isPaused;
            document.getElementById('timer-control').innerText = isPaused ? t('resume') : t('pause');
            if(isPaused) meditationAudio.pause(); else meditationAudio.play();
        }
        
        function toggleMute() {
            isMuted = !isMuted;
            meditationAudio.muted = isMuted;
            updateMuteIcon();
        }
        
        function updateMuteIcon() {
            const icon = document.getElementById('mute-icon');
            if(isMuted) icon.setAttribute('data-lucide', 'volume-x');
            else icon.setAttribute('data-lucide', 'volume-2');
            lucide.createIcons();
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        async function generateKundali(e) {
            e.preventDefault();
            const form = e.target;
            const data = {
                name: form.name.value,
                date: form.dob.value,
                time: form.tob.value,
                place: form.place.value
            };

            form.parentElement.classList.add('hidden');
            document.getElementById('loading-state').classList.remove('hidden');
            document.getElementById('loading-state').classList.add('flex');

            try {
                const langPrompt = state.language === 'hi' ? "Please generate the ENTIRE response in Hindi language (Devanagari script)." : "Please provide the response in English.";
                
                const prompt = `
                    You are an expert Vedic Astrologer. Generate a Kundali report for:
                    Name: ${data.name}
                    DOB: ${data.date}
                    Time: ${data.time}
                    Place: ${data.place}
                    
                    ${langPrompt}

                    Please provide the output in Markdown format with the following sections:
                    1. **Planetary Positions**
                    2. **Personality Analysis**
                    3. **Career & Wealth**
                    4. **Relationships**
                    5. **Lucky Elements**

                    Keep the tone spiritual, uplifting, and authentic to Vedic traditions. Use heading level 3 (###) for sections.

                    IMPORTANT: At the very end of your response, strictly provide a JSON block enclosed in \`\`\`json tags representing the planetary positions for a North Indian Kundali (Houses 1 to 12). Keys should be strings '1' to '12', values should be strings with planet names (e.g., 'Sun, Mars'). If a house is empty, use an empty string "".
                    Example format:
                    \`\`\`json
                    { "1": "Sun", "2": "", "3": "Mars, Rahu", ... "12": "Saturn" }
                    \`\`\`
                `;

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href, 
                        'X-Title': 'Ananda App'
                    },
                    body: JSON.stringify({
                        model: 'deepseek/deepseek-chat',
                        messages: [
                            { role: 'system', content: 'You are a wise and benevolent Vedic Astrologer.' },
                            { role: 'user', content: prompt }
                        ]
                    })
                });

                if (!response.ok) throw new Error('Failed to fetch prediction');

                const result = await response.json();
                let predictionText = result.choices[0].message.content;
                let chartData = {};

                const jsonMatch = predictionText.match(/```json\s*([\s\S]*?)\s*```/);
                if (jsonMatch && jsonMatch[1]) {
                    try {
                        chartData = JSON.parse(jsonMatch[1]);
                        predictionText = predictionText.replace(/```json\s*[\s\S]*?\s*```/, '');
                    } catch (e) {
                        console.error("Failed to parse chart JSON", e);
                    }
                }

                state.kundaliData = { ...data, prediction: predictionText };
                state.chartData = chartData;
                state.kundaliQA = [];
                state.kundaliQuestionsAsked = 0;
                saveState();
                router('kundali');

            } catch (error) {
                console.error(error);
                alert("The cosmic connection was interrupted. Please try again.");
                form.parentElement.classList.remove('hidden');
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('loading-state').classList.remove('flex');
            }
        }

        async function askKundaliQuestion(e) {
            e.preventDefault();
            const form = e.target;
            const input = form.question;
            const question = input.value.trim();
            if (!question) return;

            // Optimistic update
            input.disabled = true;
            document.getElementById('qa-submit-btn').disabled = true;
            document.getElementById('qa-loading').classList.remove('hidden');
            document.getElementById('qa-loading').classList.add('flex');

            try {
                const langPrompt = state.language === 'hi' ? "Please generate the ENTIRE response in Hindi language." : "Please provide the response in English.";
                
                const prompt = `
                    You are an expert Vedic Astrologer. I have previously generated a Kundali for the user with these details:
                    Name: ${state.kundaliData.name}
                    DOB: ${state.kundaliData.date}
                    Time: ${state.kundaliData.time}
                    Place: ${state.kundaliData.place}

                    Here was your initial reading:
                    ${state.kundaliData.prediction}

                    The user is now asking a specific follow-up question regarding their chart:
                    "${question}"

                    ${langPrompt}
                    Answer their question directly, concisely, and based strictly on the astrological implications of their provided birth details. Keep the tone spiritual and uplifting. Use plain text or light Markdown.
                `;

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href, 
                        'X-Title': 'Ananda App'
                    },
                    body: JSON.stringify({
                        model: 'deepseek/deepseek-chat',
                        messages: [
                            { role: 'system', content: 'You are a wise and benevolent Vedic Astrologer assisting a user.' },
                            { role: 'user', content: prompt }
                        ]
                    })
                });

                if (!response.ok) throw new Error('Failed to fetch answer');

                const result = await response.json();
                let answerText = result.choices[0].message.content;

                state.kundaliQA.push({ q: question, a: answerText });
                state.kundaliQuestionsAsked++;
                saveState();
                
                router('kundali'); // Re-render to show new QA

            } catch (error) {
                console.error(error);
                alert("Unable to fetch the astrological answer at this moment.");
                input.disabled = false;
                document.getElementById('qa-submit-btn').disabled = false;
                document.getElementById('qa-loading').classList.add('hidden');
                document.getElementById('qa-loading').classList.remove('flex');
            }
        }

        function resetKundali() {
            state.kundaliData = null;
            state.chartData = null;
            state.kundaliQA = [];
            state.kundaliQuestionsAsked = 0;
            saveState();
            router('kundali');
        }

        function findTemples() {
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser");
                return;
            }

            const btns = document.querySelectorAll('button[onclick="findTemples()"]');
            btns.forEach(btn => btn.innerHTML = '<span class="animate-spin">⏳</span> Locating...');
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const url = `https://www.google.com/maps/search/temples+near+me/@${lat},${lng},14z`;
                    window.open(url, '_blank');
                    router('temples'); // reset buttons
                },
                (error) => {
                    alert("Unable to retrieve location. Please check settings.");
                    router('temples'); // reset buttons
                }
            );
        }

        // --- Init ---
        window.addEventListener('load', () => {
            loadState();
            
            const app = document.getElementById('app-content');
            app.innerHTML = renderHome();
            lucide.createIcons();
            updateNavText();
            
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    app.style.opacity = '1';
                }, 1000);
            }, 1500);

            // Set Initial Active State Mobile
            const homeBtnMob = document.querySelector('.nav-btn-mobile[data-target="home"]');
            if(homeBtnMob) {
                homeBtnMob.querySelector('svg').classList.add('text-brand-600');
                homeBtnMob.querySelector('.nav-icon-wrapper').classList.add('bg-brand-50');
                homeBtnMob.querySelector('span').classList.add('text-brand-600');
            }
            // Set Initial Active State Desktop
            const homeBtnDesk = document.querySelector('.nav-btn-desktop[data-target="home"]');
            if(homeBtnDesk) {
                homeBtnDesk.classList.remove('text-gray-600');
                homeBtnDesk.classList.add('bg-brand-50', 'text-brand-700', 'shadow-sm', 'border', 'border-brand-100');
            }
        });

    </script>
</body>
